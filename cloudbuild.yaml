steps:
  # Build backend Docker image from backend/Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/campusx-solutionchallenge2026/campusx-backend:$COMMIT_SHA'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend/'

  # Build frontend Docker image from root Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/campusx-solutionchallenge2026/campusx-frontend:$COMMIT_SHA'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/campusx-solutionchallenge2026/campusx-backend:$COMMIT_SHA'

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/campusx-solutionchallenge2026/campusx-frontend:$COMMIT_SHA'

  # Deploy backend to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=asia-south1'
    args:
      - run
      - services
      - update
      - campusx-backend
      - --platform=managed
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/campusx-solutionchallenge2026/campusx-backend:$COMMIT_SHA
      - --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID
      - --region=asia-south1
      - --quiet
    entrypoint: gcloud

  # Deploy frontend to Cloud Run with backend API URL as environment variable
  - name: 'gcr.io/cloud-builders/gke-deploy'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=asia-south1'
      - 'PROJECT_ID=$PROJECT_ID'
    entrypoint: bash
    args:
      - -c
      - |
        # Get the deployed backend service URL
        BACKEND_URL=$$(gcloud run services describe campusx-backend --platform=managed --region=asia-south1 --project=$PROJECT_ID --format='value(status.url)' 2>/dev/null || echo "")
        
        if [ -z "$$BACKEND_URL" ]; then
          echo "Warning: Could not retrieve backend service URL, using default"
          BACKEND_URL="https://campusx-backend-asia-south1.run.app"
        fi
        
        echo "Deploying frontend with backend URL: $$BACKEND_URL"
        
        # Deploy frontend with backend URL as environment variable
        gcloud run services update campusx-frontend \
          --platform=managed \
          --image=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/campusx-solutionchallenge2026/campusx-frontend:$COMMIT_SHA \
          --labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID \
          --set-env-vars="VITE_API_URL=$$BACKEND_URL" \
          --region=asia-south1 \
          --no-require-authentication \
          --quiet \
          --project=$PROJECT_ID

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/campusx-solutionchallenge2026/campusx-backend:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/campusx-solutionchallenge2026/campusx-frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
